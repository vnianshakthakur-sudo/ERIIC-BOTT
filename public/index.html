<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anurag Th3 L3g3nd Bot Panel</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* 🔐 LOGIN SCREEN */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
        }

        .login-box h1 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #f1c40f, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-box p {
            color: #aaa;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .login-box input {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 16px;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .login-box input:focus {
            outline: none;
            border-color: #f1c40f;
        }

        .login-box button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #27ae60, #2ecc71);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(39, 174, 96, 0.4);
        }

        .error-msg {
            color: #e74c3c;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }

        /* 📱 MAIN PANEL */
        #main-panel {
            display: none;
            width: 100%;
            max-width: 800px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 32px;
            background: linear-gradient(45deg, #f1c40f, #e74c3c, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .header .subtitle {
            color: #888;
            font-size: 14px;
        }

        .controls {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: #3498db;
        }

        .input-group textarea {
            min-height: 120px;
            resize: vertical;
            font-family: monospace;
            font-size: 12px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-start {
            background: linear-gradient(45deg, #27ae60, #2ecc71);
            color: white;
        }

        .btn-stop {
            background: linear-gradient(45deg, #c0392b, #e74c3c);
            color: white;
        }

        .btn-refresh {
            background: linear-gradient(45deg, #2980b9, #3498db);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* 📋 LOGS SECTION */
        .logs-section {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
        }

        .logs-header {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logs-header h3 {
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e74c3c;
            animation: pulse 2s infinite;
        }

        .status-dot.active {
            background: #2ecc71;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .log-actions {
            display: flex;
            gap: 10px;
        }

        .log-actions button {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .log-actions button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        #log-area {
            height: 350px;
            overflow-y: auto;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
            color: #0f0;
            background: #000;
        }

        #log-area::-webkit-scrollbar {
            width: 8px;
        }

        #log-area::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        #log-area::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        .log-entry {
            margin-bottom: 5px;
            padding: 3px 0;
            border-bottom: 1px solid rgba(0, 255, 0, 0.1);
        }

        .log-entry.error {
            color: #ff4444;
        }

        .log-entry.warn {
            color: #ffaa00;
        }

        .log-entry.info {
            color: #44aaff;
        }

        /* 👤 FOOTER / CONTACT */
        .footer {
            margin-top: 30px;
            text-align: center;
            padding: 20px;
        }

        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(45deg, #25d366, #128c7e);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3);
        }

        .whatsapp-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(37, 211, 102, 0.5);
        }

        .owner-tag {
            margin-top: 15px;
            color: #888;
            font-size: 13px;
        }

        .owner-tag span {
            color: #f1c40f;
            font-weight: bold;
        }

        /* 📱 RESPONSIVE */
        @media (max-width: 600px) {
            .btn-group {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 24px;
            }

            #log-area {
                height: 250px;
            }
        }

        /* 🎉 SUCCESS ANIMATION */
        .success-check {
            display: none;
            color: #2ecc71;
            font-size: 50px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <!-- 🔐 LOGIN SCREEN -->
    <div id="login-screen">
        <div class="login-box">
            <i class="fas fa-lock" style="font-size: 40px; color: #f1c40f; margin-bottom: 20px;"></i>
            <h1>ANURAG BOT PANEL</h1>
            <p>Enter password to access the control panel</p>
            <input type="password" id="password-input" placeholder="Enter Password">
            <button onclick="verifyPassword()">
                <i class="fas fa-sign-in-alt"></i> LOGIN
            </button>
            <div class="error-msg" id="error-msg">
                <i class="fas fa-exclamation-circle"></i> Invalid Password!
            </div>
        </div>
    </div>

    <!-- 📱 MAIN PANEL -->
    <div id="main-panel">
        <div class="header">
            <h1><i class="fas fa-robot"></i> ANURAG TH3 L3G3ND</h1>
            <p class="subtitle">Bot Control Panel</p>
        </div>

        <div class="controls">
            <div class="input-group">
                <label><i class="fas fa-user"></i> Admin UID</label>
                <input type="text" id="adminUID" placeholder="Enter your Facebook UID">
            </div>

            <div class="input-group">
                <label><i class="fas fa-key"></i> AppState JSON</label>
                <textarea id="appstate" placeholder="Paste your appstate.json content here..."></textarea>
            </div>

            <div class="btn-group">
                <button class="btn btn-start" onclick="startBot()">
                    <i class="fas fa-play"></i> START
                </button>
                <button class="btn btn-stop" onclick="stopBot()">
                    <i class="fas fa-stop"></i> STOP
                </button>
                <button class="btn btn-refresh" onclick="refreshLogs()">
                    <i class="fas fa-sync"></i> REFRESH
                </button>
            </div>
        </div>

        <div class="logs-section">
            <div class="logs-header">
                <h3>
                    <span class="status-dot" id="status-dot"></span>
                    <i class="fas fa-terminal"></i> LIVE LOGS
                </h3>
                <div class="log-actions">
                    <button onclick="clearLogs()">
                        <i class="fas fa-trash"></i> Clear
                    </button>
                    <button onclick="downloadLogs()">
                        <i class="fas fa-download"></i> Save
                    </button>
                </div>
            </div>
            <div id="log-area">
                <div class="log-entry info">📡 Waiting for bot to start...</div>
            </div>
        </div>

        <div class="footer">
            <a href="https://wa.me/916394812128" target="_blank" class="whatsapp-btn">
                <i class="fab fa-whatsapp"></i> Contact Owner
            </a>
            <p class="owner-tag">
                <i class="fas fa-crown"></i> Owner: <span>Anurag Mishra</span>
            </p>
        </div>
    </div>

    <script>
        const socket = io();
        const logArea = document.getElementById('log-area');
        const adminInput = document.getElementById('adminUID');
        const statusDot = document.getElementById('status-dot');
        let isBotRunning = false;

        // 🔐 PASSWORD VERIFICATION
        async function verifyPassword() {
            const password = document.getElementById('password-input').value.trim();
            const errorMsg = document.getElementById('error-msg');

            if (!password) {
                errorMsg.style.display = 'block';
                errorMsg.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please enter password!';
                return;
            }

            try {
                const res = await fetch('/verify-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await res.json();

                if (data.success) {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('main-panel').style.display = 'block';
                } else {
                    errorMsg.style.display = 'block';
                    errorMsg.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + data.message;
                }
            } catch (e) {
                errorMsg.style.display = 'block';
                errorMsg.innerHTML = '<i class="fas fa-exclamation-circle"></i> Server error!';
            }
        }

        // Enter key support for password
        document.getElementById('password-input')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verifyPassword();
        });

        // 📝 LOG FUNCTIONS
        function appendLog(text) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';

            if (text.includes('❌') || text.includes('ERR') || text.includes('error')) {
                entry.classList.add('error');
            } else if (text.includes('⚠️') || text.includes('warn')) {
                entry.classList.add('warn');
            } else if (text.includes('✅') || text.includes('📡') || text.includes('🤖')) {
                entry.classList.add('info');
            }

            entry.textContent = text;
            logArea.appendChild(entry);
            logArea.scrollTop = logArea.scrollHeight;
        }

        function clearLogs() {
            logArea.innerHTML = '<div class="log-entry info">🗑️ Logs cleared...</div>';
        }

        function downloadLogs() {
            const text = logArea.innerText;
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `bot-logs-${new Date().toISOString().slice(0, 10)}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 🔌 SOCKET EVENTS
        socket.on('botlog', (text) => {
            appendLog(text);
            if (text.includes('started') || text.includes('LOGGED IN')) {
                isBotRunning = true;
                statusDot.classList.add('active');
            }
            if (text.includes('stopped') || text.includes('exited')) {
                isBotRunning = false;
                statusDot.classList.remove('active');
            }
        });

        // 🤖 BOT CONTROLS
        async function startBot() {
            const admin = adminInput.value.trim();
            const appstate = document.getElementById('appstate').value.trim();

            if (!admin || !appstate) {
                alert('❌ Please enter both UID and AppState!');
                return;
            }

            socket.emit('join', admin);
            appendLog('⏳ Starting bot...');

            try {
                const res = await fetch('/start-bot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ admin, appstate })
                });
                const text = await res.text();
                appendLog(text);
            } catch (e) {
                appendLog('❌ Error: ' + e.message);
            }
        }

        async function stopBot() {
            const admin = adminInput.value.trim();
            if (!admin) {
                alert('❌ Please enter UID!');
                return;
            }

            appendLog('⏳ Stopping bot...');

            try {
                const res = await fetch(`/stop-bot?uid=${admin}`);
                const text = await res.text();
                appendLog(text);
            } catch (e) {
                appendLog('❌ Error: ' + e.message);
            }
        }

        async function refreshLogs() {
            const admin = adminInput.value.trim();
            if (!admin) {
                alert('❌ Please enter UID!');
                return;
            }

            try {
                const res = await fetch(`/logs?uid=${admin}`);
                const text = await res.text();
                logArea.innerHTML = '';
                text.split('\n').forEach(line => {
                    if (line.trim()) appendLog(line);
                });
            } catch (e) {
                appendLog('❌ Error fetching logs: ' + e.message);
            }
        }
    </script>
</body>
</html>
